# DWITP Source Registry
# ======================
# Every source must be explicitly approved before crawling.
# Add entries here and commit. No runtime additions.
#
# Schema:
#   source_id:       Unique identifier (e.g., "dread_forum")
#   url:             Full .onion URL
#   category:        forum | search_engine | ransomware_tracking | paste | marketplace
#   status:          approved | pending | retired | quarantined
#   approved_by:     Reviewer name
#   approved_date:   ISO date (YYYY-MM-DD)
#   approval_signature: Reviewer's PGP signature or verification reference
#   risk_level:      low | medium | high
#   review_notes:    Free-text notes from review
#   last_reviewed:   ISO date of last review
#
# Only entries with status: "approved" will be crawled.

sources:
