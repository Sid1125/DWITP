    category: forum
    status: approved
    approved_by: siddharth
    approved_date: "2026-06-08"
    approval_signature: manual-review
    review_notes: "Primary discussion forum for threat intelligence monitoring"
    risk_level: medium
    last_reviewed: "2026-06-08"
    max_pages: 600
    link_selector: "a[href*='post/'],a[href*='/u/'],a[href*='/d/']"
    queue_wait_seconds: 25
